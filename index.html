<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1b140c">
<title>シュガーレジスタンス MVP</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<style>
:root{
  --bg:#1b140c; --bg-card:#2a1f14; --bg-panel:#34281a;
  --accent:#c9924a; --gold:#d4a017; --success:#5e8c72;
  --danger:#b33a2e; --warn:#cf9a3e; --text:#e8d9bb; --text-dim:#a89878;
  --border:#4a3a26; --coffee:#3d2512; --sugar:#fffaf0;
  --rivet:#6b5a3a; --btn-ink:#2b1c0a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
.screen{display:none;position:fixed;top:0;left:0;right:0;bottom:56px;flex-direction:column;background:var(--bg);overflow-y:auto;z-index:1}
.screen.active{display:flex}
#screen-login.screen{bottom:0}

/* ══ 永続ボトムナビ(全画面共通) ══ */
#bottom-nav{position:fixed;left:0;right:0;bottom:0;height:56px;z-index:600;display:flex;
  background:var(--bg-card);border-top:2px solid var(--rivet);padding:4px 3px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
#bottom-nav.hide{display:none}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  min-height:44px;background:none;border:none;color:var(--text-dim);font-size:8.5px;
  cursor:pointer;border-radius:8px;transition:background .15s,color .15s}
.bn-btn:active{background:var(--bg-panel)}
.bn-btn .mi{font-size:17px}
.bn-btn.active{color:var(--accent)}
.bn-btn.bn-disabled{opacity:.4}
.btn{display:block;width:100%;padding:13px 16px;border:none;border-radius:6px;
  font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;text-align:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -2px 0 rgba(0,0,0,.3),0 2px 3px rgba(0,0,0,.45)}
.btn:active{opacity:.7}
.btn-primary{background:linear-gradient(180deg,#dba968,var(--accent));color:var(--btn-ink)}
.btn-gold{background:linear-gradient(180deg,#e8c456,var(--gold));color:var(--btn-ink)}
.btn-success{background:linear-gradient(180deg,#7eab90,var(--success));color:var(--btn-ink)}
.btn-danger{background:linear-gradient(180deg,#cf6354,var(--danger));color:#fff2e8}
.btn-dim{background:var(--bg-panel);color:var(--text-dim);border:1px solid var(--border)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.header{display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;background:var(--bg-card);border-bottom:2px solid var(--rivet);flex-shrink:0}
.header h1{font-family:Georgia,'Times New Roman',serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:1px}
.header h1::after{content:' ⚙';display:inline-block;font-size:.75em;color:var(--text-dim);
  animation:gear-spin 7s linear infinite;transform-origin:50% 55%}
@keyframes gear-spin{to{transform:rotate(360deg)}}
.back-btn{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:4px}
.card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;
  padding:16px;margin:12px 16px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)}
.card::before,.card::after{content:'';position:absolute;width:9px;height:9px;
  border:2px solid var(--gold);opacity:.55;pointer-events:none}
.card::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.card::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.section-title{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim);font-size:13px}
.stat-val{font-weight:700;font-size:13px}

/* Login */
#screen-login{justify-content:center;align-items:center}
.login-wrap{width:100%;max-width:380px;padding:32px 24px}
.login-logo{font-size:64px;text-align:center}
.login-title{text-align:center;margin:10px 0 30px}
.login-title h1{font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:900;color:var(--gold);letter-spacing:2px}
.login-title p{color:var(--text-dim);font-size:12px;letter-spacing:1px;margin-top:6px;line-height:1.7}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.form-group input{width:100%;padding:13px;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:16px;outline:none}
.form-group input:focus{border-color:var(--accent)}
.login-note{text-align:center;color:var(--text-dim);font-size:11px;margin-top:16px;line-height:1.7}

/* Map */
#screen-map{overflow:hidden}
#map{flex:1;min-height:0;position:relative}
.map-footer{background:var(--bg-card);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.map-status{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--text-dim)}
.map-status span{display:flex;align-items:center;gap:4px}
.btn-soft{opacity:.4}

#guide-bar{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;flex-shrink:0;
  background:var(--bg-card);border-bottom:1px solid var(--border)}
.guide-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg-panel);border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.guide-bubble{position:relative;flex:1;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:10px;padding:7px 10px;font-size:12px;line-height:1.5;color:var(--text)}
.guide-bubble::before{content:'';position:absolute;left:-5px;top:9px;width:0;height:0;
  border-top:5px solid transparent;border-bottom:5px solid transparent;border-right:6px solid var(--border)}
.guide-name{color:var(--gold);font-weight:700;font-size:10px;display:block;margin-bottom:2px}

#exposure-panel{display:flex;align-items:center;gap:10px;padding:8px 16px;flex-shrink:0;
  background:linear-gradient(135deg,#1f150a,#291d10);border-bottom:1px solid rgba(201,146,74,.3)}
.exp-label{font-size:11px;color:var(--text-dim);white-space:nowrap}
.exp-bar{flex:1;height:7px;background:var(--bg-panel);border-radius:4px;overflow:hidden}
.exp-fill{height:100%;border-radius:4px;transition:width .4s,background .4s;width:0%}
.exp-val{font-size:11px;font-weight:700;color:var(--accent);width:30px;text-align:right}

/* Detail/HQ */
#screen-detail,#screen-hq{overflow-y:auto}
.prop-name{font-size:19px;font-weight:700;margin-bottom:4px}
.prop-hash{font-size:10px;color:var(--text-dim);font-family:monospace}
.state-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:6px}
.pen-bar-wrap{margin:14px 0 4px}
.pen-bar{height:10px;background:var(--bg-panel);border-radius:5px;overflow:hidden}
.pen-fill{height:100%;border-radius:5px;transition:width .5s}
.risk-note{font-size:12px;color:var(--danger);margin-top:8px;display:flex;align-items:center;gap:6px}

.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.tab-btn{flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;padding:6px 0;
  font-size:13px;background:none;border:none;color:var(--text-dim);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.mission-item{padding:11px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mission-item:last-child{border-bottom:none}
.mission-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.mission-chk.done{background:var(--success);border-color:var(--success);color:var(--btn-ink)}
.mission-title{font-size:13px;font-weight:600}

.log-item{padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;justify-content:space-between;gap:8px}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--text-dim);font-size:11px;flex-shrink:0}

.streak-hero{text-align:center;padding:18px 0}
.streak-num{font-size:44px;font-weight:900;color:var(--gold);text-shadow:0 0 16px rgba(212,160,23,.4)}
.streak-sub{font-size:12px;color:var(--text-dim);margin-top:4px}
.milestone-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.milestone-chip{font-size:11px;padding:4px 9px;border-radius:12px;border:1px solid var(--border);color:var(--text-dim)}
.milestone-chip.hit{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.12)}

.empty-state{text-align:center;padding:32px 16px;color:var(--text-dim)}
.empty-state .icon{font-size:38px;margin-bottom:10px}

/* GPS / legend */
#gps-btn{position:absolute;right:12px;bottom:14px;z-index:400;width:46px;height:46px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:50%;font-size:19px;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center}
#gps-btn:active{transform:scale(.9)}
#map-legend{position:absolute;left:12px;bottom:14px;z-index:400}
.legend-toggle{width:46px;height:46px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:50%;font-size:16px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center}
.legend-panel{display:none;position:absolute;bottom:54px;left:0;background:var(--bg-card);
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;white-space:nowrap;
  box-shadow:0 4px 18px rgba(0,0,0,.55);font-size:11px}
.legend-panel.show{display:block}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.legend-row:last-child{margin-bottom:0}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}

/* Floating gain label (checkin juice) */
.float-gain{position:fixed;left:50%;bottom:170px;transform:translateX(-50%);
  font-size:22px;font-weight:900;color:var(--gold);text-shadow:0 0 10px rgba(212,160,23,.6);
  pointer-events:none;z-index:1350;animation:float-gain-up 1.1s ease-out forwards}
@keyframes float-gain-up{0%{opacity:0;transform:translate(-50%,0) scale(.7)}15%{opacity:1;transform:translate(-50%,-6px) scale(1.08)}100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}

/* Checkin button ripple */
.btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);
  pointer-events:none;transform:scale(0);animation:btn-ripple-anim .55s linear}
@keyframes btn-ripple-anim{to{transform:scale(2.6);opacity:0}}

/* Inspector flash */
#inspector-flash{position:fixed;inset:0;background:rgba(179,58,46,.45);z-index:1300;pointer-events:none;opacity:0}
#inspector-flash.show{animation:inspector-blink 1.6s ease-in-out}
@keyframes inspector-blink{0%,100%{opacity:0}15%,35%{opacity:.7}25%,45%{opacity:.15}55%{opacity:.7}65%{opacity:0}}

/* Decrypt overlay */
.decrypt-bg{display:none;position:fixed;inset:0;background:rgba(2,8,7,.94);z-index:1100;
  flex-direction:column;align-items:center;justify-content:center;gap:16px}
.decrypt-bg.active{display:flex}
.decrypt-text{font-size:14px;color:var(--gold);letter-spacing:1px;font-family:monospace}
.decrypt-bar{width:220px;height:8px;background:var(--bg-panel);border-radius:4px;overflow:hidden}
.decrypt-fill{height:100%;background:var(--gold);width:0%}

/* Modal (milk captain etc.) */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
  align-items:center;justify-content:center;padding:24px}
.modal-bg.active{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:24px;width:100%;max-width:360px;text-align:center}
.modal-box .icon{font-size:42px;margin-bottom:8px}
.modal-box h3{font-size:16px;margin-bottom:10px;color:var(--accent)}
.modal-box p{color:var(--text-dim);font-size:13px;line-height:1.8;margin-bottom:18px;white-space:pre-line;text-align:left}

/* Toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 18px;font-size:13px;z-index:1400;pointer-events:none;
  opacity:0;transition:opacity .3s;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.toast.info{border-color:var(--accent);color:var(--accent)}

/* ══ 通信網スクリーン(蒸気配管/真鍮ゲージ風) ══ */
#screen-network{overflow:hidden;background:#140d07}
.netscr-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;
  background:#20160c;border-bottom:2px solid var(--rivet);flex-shrink:0}
.netscr-header h1{font-family:Georgia,'Times New Roman',serif;font-size:15px;font-weight:700;color:#d9a956;letter-spacing:1px}
.netscr-ap{display:flex;align-items:center;gap:5px;background:#2a1d10;border:1px solid rgba(201,146,74,.35);
  border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;color:#d9a956}
.sw-bar-wrap{position:relative;height:26px;margin:10px 16px;flex-shrink:0;
  background:#20160c;border:1px solid rgba(201,146,74,.35);border-radius:4px;overflow:hidden}
.sw-bar-fill{height:100%;background:linear-gradient(90deg,#8a5a1e,#d9a956);border-radius:4px;
  transition:width .5s;box-shadow:0 0 12px rgba(201,146,74,.5)}
.sw-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;letter-spacing:1px;color:#f3e3c0;text-shadow:0 1px 2px rgba(0,0,0,.6)}
#net-graph-wrap{flex:1;min-height:0;position:relative;margin:0 16px 10px}
#net-graph-wrap svg{width:100%;height:100%;display:block}
.net-node{cursor:pointer}
.net-node-ring-sel{fill:none;stroke:#fff3d0;stroke-width:1.6;stroke-dasharray:3 3}
.net-node-ring-hq{fill:none;stroke:#d9a956;stroke-width:2}
.net-node-ring-hub{fill:none;stroke:#5e8c72;stroke-width:2;stroke-dasharray:2 2}
.net-edge{stroke:#e8c97a;stroke-width:2.2;opacity:.9;stroke-dasharray:6 5;animation:net-flow 1s linear infinite}
.net-edge-glow{stroke:#d9a956;stroke-width:5;opacity:.18}
@keyframes net-flow{to{stroke-dashoffset:-11}}
.netscr-panel{flex-shrink:0;background:#20160c;border-top:2px solid var(--rivet);
  padding:12px 16px 16px}
.netscr-name{font-family:Georgia,'Times New Roman',serif;font-size:15px;font-weight:700;color:#f3e3c0}
.netscr-sub{font-size:11px;color:#8a7558;margin-top:1px;margin-bottom:10px}
.net-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.net-stat{background:#2a1d10;border:1px solid rgba(201,146,74,.25);border-radius:6px;padding:7px 4px;text-align:center}
.net-stat-label{font-size:8px;color:#8a7558;text-transform:uppercase;letter-spacing:.5px}
.net-stat-val{font-size:13px;font-weight:800;color:#d9a956;margin-top:2px}
.btn-net{display:block;width:100%;padding:13px;border:none;border-radius:6px;font-size:14px;font-weight:800;
  letter-spacing:.5px;cursor:pointer;background:linear-gradient(180deg,#e0b46a,#8a5a1e);color:var(--btn-ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 0 rgba(0,0,0,.3),0 2px 3px rgba(0,0,0,.45)}
.btn-net:disabled{opacity:.3;cursor:not-allowed}
.btn-net-cancel{display:block;width:100%;padding:8px;margin-top:6px;border:1px solid rgba(179,58,46,.45);
  border-radius:8px;background:none;color:var(--danger);font-size:12px;cursor:pointer}
.netscr-empty{padding:14px 0;text-align:center;color:#8a7558;font-size:12px}

.maplibregl-canvas-container,.maplibregl-canvas{background:#140d07}
.maplibregl-ctrl-group{background:var(--bg-card)!important;border:1px solid var(--border)!important;border-radius:6px!important}
.maplibregl-ctrl-group button{background:var(--bg-card)!important;width:34px!important;height:34px!important}
.maplibregl-ctrl-attrib{font-size:9px!important;opacity:.3}
.maplibregl-ctrl-compass{display:none!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">🍬</div>
    <div class="login-title"><h1>シュガーレジスタンス</h1>
      <p>裏の世界へ、潜入開始。</p>
    </div>
    <div class="form-group">
      <label>レジスタンス名(LINE名の代わり)</label>
      <input type="text" id="name-input" placeholder="名前を入力..." maxlength="16" autocomplete="off">
    </div>
    <button class="btn btn-gold" id="start-btn">▶ 潜入を開始する</button>
    <div class="login-note" id="login-note"></div>
  </div>
</div>

<!-- MAP -->
<div id="screen-map" class="screen">
  <div class="header">
    <h1>🍬 シュガーレジスタンス</h1>
    <span style="display:flex;align-items:center;gap:8px">
      <span id="hdr-test-badge" style="display:none;color:var(--danger);font-weight:700;font-size:11px;border:1px solid var(--danger);border-radius:4px;padding:1px 5px">🧪TEST</span>
      <span id="hdr-streak" style="color:var(--gold);font-weight:700;font-size:13px">🔥0</span>
    </span>
  </div>
  <div id="guide-bar">
    <div class="guide-avatar">🥛</div>
    <div class="guide-bubble"><span class="guide-name">ミルク隊長</span><span id="guide-text">…</span></div>
  </div>
  <div id="time-bonus-badge" style="display:none;font-size:11px;color:var(--gold);text-align:center;padding:4px 16px;background:var(--bg-panel);border-bottom:1px solid var(--border)"></div>
  <div id="exposure-panel">
    <span class="exp-label">👁 露出度</span>
    <div class="exp-bar"><div class="exp-fill" id="exp-fill"></div></div>
    <span class="exp-val" id="exp-val">0</span>
  </div>
  <div id="map">
    <button id="gps-btn" title="現在地へ">🎯</button>
    <div id="map-legend">
      <button class="legend-toggle" id="legend-toggle" title="凡例">🗂</button>
      <div class="legend-panel" id="legend-panel">
        <div class="legend-row"><div class="legend-swatch" style="background:#3d2512"></div>未感染(0%)</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#a9742f"></div>潜伏中(1-39%)</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#f0a73a"></div>発症(40-79%)</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#fffaf0"></div>完全寝返り(80%+)</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#b33a2e"></div>検査官リスクあり(赤枠)</div>
      </div>
    </div>
  </div>
  <div class="map-footer">
    <div class="map-status">
      <span id="footer-hq">🏠 本拠地: 未登録</span>
      <span id="footer-tasks">📦 未処理タスク: 0</span>
    </div>
    <button class="btn btn-primary" id="checkin-btn" style="font-size:16px;padding:15px;position:relative;overflow:hidden">🍬 チェックイン(砂糖を仕込む)</button>
  </div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen">
  <div class="header">
    <h1>陣地詳細</h1>
  </div>
  <div id="detail-body" style="padding-bottom:24px"></div>
</div>

<!-- HQ -->
<div id="screen-hq" class="screen">
  <div class="header">
    <h1>🏠 本拠地(HQ)</h1>
  </div>
  <div id="hq-body" style="padding-bottom:24px"></div>
</div>

<!-- NETWORK (本拠地限定: 通信網) -->
<div id="screen-network" class="screen">
  <div class="netscr-header">
    <h1>🕸️ 通信網</h1>
    <div class="netscr-ap">🔓 <span id="net-ap-val">0</span></div>
  </div>
  <div class="sw-bar-wrap">
    <div class="sw-bar-fill" id="sw-bar-fill" style="width:0%"></div>

/* ══════════ GEOHASH ══════════ */
const Geohash = (() => {
  const B32 = '0123456789bcdefghjkmnpqrstuvwxyz';
  function encode(lat,lon,prec){prec=prec||7;let idx=0,bit=0,even=true,hash='';let latMin=-90,latMax=90,lonMin=-180,lonMax=180;
    while(hash.length<prec){if(even){const m=(lonMin+lonMax)/2;if(lon>=m){idx=(idx<<1)|1;lonMin=m;}else{idx<<=1;lonMax=m;}}
      else{const m=(latMin+latMax)/2;if(lat>=m){idx=(idx<<1)|1;latMin=m;}else{idx<<=1;latMax=m;}}
      even=!even;if(++bit===5){hash+=B32[idx];idx=0;bit=0;}}
    return hash;}
  function bounds(hash){let even=true,latMin=-90,latMax=90,lonMin=-180,lonMax=180;
    for(const c of hash){const idx=B32.indexOf(c);
      for(let b=4;b>=0;b--){const bit=(idx>>b)&1;
        if(even){const m=(lonMin+lonMax)/2;if(bit)lonMin=m;else lonMax=m;}
        else{const m=(latMin+latMax)/2;if(bit)latMin=m;else latMax=m;}
        even=!even;}}
    return{sw:{lat:latMin,lon:lonMin},ne:{lat:latMax,lon:lonMax}};}
  function decode(hash){const b=bounds(hash);return{lat:(b.sw.lat+b.ne.lat)/2,lon:(b.sw.lon+b.ne.lon)/2};}
  function adjacent(hash,dir){const b=bounds(hash);const lat=(b.sw.lat+b.ne.lat)/2,lon=(b.sw.lon+b.ne.lon)/2;
    const dLat=b.ne.lat-b.sw.lat,dLon=b.ne.lon-b.sw.lon;const p=hash.length;
    if(dir==='n')return encode(lat+dLat,lon,p);if(dir==='s')return encode(lat-dLat,lon,p);
    if(dir==='e')return encode(lat,lon+dLon,p);if(dir==='w')return encode(lat,lon-dLon,p);}
  function inBounds(swLat,swLon,neLat,neLon,prec){prec=prec||7;const list=[];let rowHash=encode(swLat,swLon,prec);
    for(let r=0;r<60;r++){const rb=bounds(rowHash);if(rb.sw.lat>neLat)break;
      let col=rowHash;
      for(let c=0;c<60;c++){const cb=bounds(col);if(cb.sw.lon>neLon)break;
        list.push(col);if(list.length>=800)return list;col=adjacent(col,'e');}
      rowHash=adjacent(rowHash,'n');}
    return list;}
  return{encode,decode,bounds,adjacent,inBounds};
})();

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  const onejan=new Date(d.getFullYear(),0,1);
  const week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+'-W'+week;
}
function hexToRgb(h){h=h.replace('#','');return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};}
function lerpColor(a,b,t){
  const pa=hexToRgb(a),pb=hexToRgb(b);
  const r=Math.round(pa.r+(pb.r-pa.r)*t),g=Math.round(pa.g+(pb.g-pa.g)*t),bl=Math.round(pa.b+(pb.b-pa.b)*t);
  return 'rgb('+r+','+g+','+bl+')';
}

  adj.push(Geohash.adjacent(Geohash.adjacent(hash,'n'),'w'));
  adj.push(Geohash.adjacent(Geohash.adjacent(hash,'s'),'e'));
  adj.push(Geohash.adjacent(Geohash.adjacent(hash,'s'),'w'));
  return adj;
}

}

/* ══════════ 通信網(有向接続: 接続元→接続先、接続元は最大5本(帯域拡張で8本)・接続先は最大1本) ══════════ */
const NET_OUT_MAX=5, NET_IN_MAX=1;
function outDegree(hash){ return S.connections.filter(c=>c[0]===hash).length; }
function inDegree(hash){ return S.connections.filter(c=>c[1]===hash).length; }
function outDegreeMax(hash){
  const t=S.territories[hash];
  return (t&&t.bandwidthUpgraded)? NET_OUT_MAX_UPGRADED : NET_OUT_MAX;
}
function isHubTerritory(hash){ return outDegree(hash)>=HUB_OUT_DEGREE_THRESHOLD; }
function isAlreadyConnected(from,to){
  return S.connections.some(c=>c[0]===from&&c[1]===to);
}
function canConnect(from,to){
  if(!from||!to||from===to) return {ok:false, reason:'同じ陣地は接続できません'};
  const tf=S.territories[from], tt=S.territories[to];
  if(!tf||!tf.checkinCount||!tt||!tt.checkinCount) return {ok:false, reason:'両方ともチェックイン済みの陣地が必要です'};
  if(isAlreadyConnected(from,to)) return {ok:false, reason:'すでに接続済みです'};
  const maxOut=outDegreeMax(from);
  if(outDegree(from)>=maxOut) return {ok:false, reason:'接続元はすでに'+maxOut+'本接続済みです(最大'+maxOut+'本)'};
  if(inDegree(to)>=NET_IN_MAX) return {ok:false, reason:'接続先はすでに接続を受けています(最大'+NET_IN_MAX+'本)'};
  if((S.user.apPoints||0)<AP_CONNECT_COST) return {ok:false, reason:'解析ポイントが足りません(必要:'+AP_CONNECT_COST+'AP)'};
  return {ok:true};
}
function connectTerritories(from,to){
  const chk=canConnect(from,to);
  if(!chk.ok){ toast(chk.reason,'error'); return false; }
  S.user.apPoints-=AP_CONNECT_COST;
  S.user.totalApSpent=(S.user.totalApSpent||0)+AP_CONNECT_COST;
  S.connections.push([from,to]);
  save();
  toast('🔗 AP'+AP_CONNECT_COST+'消費で通信経路を接続した','success');
  setTimeout(checkProgress,200);
  return true;
}
function isConnectedToHQ(hash){
  return hopDistanceFromHQ(hash)!==Infinity;
}
function hopDistanceFromHQ(hash){
  if(!S.user.hqGeohash) return Infinity;
  if(hash===S.user.hqGeohash) return 0;
  const visited=new Map([[S.user.hqGeohash,0]]);
  const queue=[S.user.hqGeohash];
  while(queue.length){
    const cur=queue.shift();
    const d=visited.get(cur);
    S.connections.forEach(c=>{
      if(c[0]===cur && !visited.has(c[1])){ visited.set(c[1], d+1); queue.push(c[1]); }
    });
  }
  return visited.has(hash) ? visited.get(hash) : Infinity;
}
function supplyGainForHop(hop){
  if(hop<=1) return 5;
  if(hop===2) return 3;
  if(hop===3) return 2;
  return 1;
}
function resolveNetworkSupply(){
  if(!S.user.hqGeohash) return;
  let changed=false;
  Object.values(S.territories).forEach(t=>{
    if(t.geohash===S.user.hqGeohash) return;
    if(t.penetration<=0) return;
    const before=t.penetration;
    const hop=hopDistanceFromHQ(t.geohash);
    if(hop===Infinity){
      t.penetration=clamp(t.penetration-NETWORK_DECAY_AMOUNT,0,100);
    } else {
      t.penetration=clamp(t.penetration-NETWORK_DECAY_AMOUNT+supplyGainForHop(hop),0,100);
    }
    if(t.penetration!==before) changed=true;
  });
  if(changed){
    save();
    redrawGridSafe();
    logSummary('📦 補給シュガーが配給され、各陣地の寝返り状況が更新された');
  }
}
const RECONQUEST_CHANCE_PER_DAY=0.05, RECONQUEST_PENALTY=30, RECONQUEST_MIN_OWNED=5;
function resolveReconquestEvent(){
  const owned=Object.values(S.territories).filter(t=>t.checkinCount>0 && t.penetration>0);
  if(owned.length<RECONQUEST_MIN_OWNED) return;
  if(Math.random()>=RECONQUEST_CHANCE_PER_DAY) return;
  const count=2+Math.floor(Math.random()*2);
  const targets=owned.slice().sort(()=>Math.random()-0.5).slice(0,count);
  targets.forEach(t=>{ t.penetration=clamp(t.penetration-RECONQUEST_PENALTY,0,100); });
  S.checkinLogs.unshift({type:'reconquest', geohash:targets[0].geohash, ts:Date.now(),
    note:'黒コーヒー帝国による大規模な奪還作戦('+targets.length+'陣地)'});
  save();
  redrawGridSafe();
  logSummary('⚔️ 黒コーヒー帝国の大規模な奪還作戦が発生！'+targets.map(t=>nameForHash(t.geohash)).join('・')+'の浸透度が大きく後退した(-'+RECONQUEST_PENALTY+'%)');
}

function weeklyMetricValue(metric){
  if(metric==='convert') return countConverted();
  if(metric==='checkins') return S.user.totalCheckins||0;
  if(metric==='tasksProcessed') return S.user.totalTasksProcessed||0;
  if(metric==='connections') return S.connections.length;
  return 0;
}
function checkWeeklyRollover(){
  const wk=weekKey();
  if(!S.weeklyMission || S.weeklyMission.weekKey!==wk){
    let n=0; for(let i=0;i<wk.length;i++) n=((n*31)+wk.charCodeAt(i))>>>0;
    const def=WEEKLY_CHALLENGE_DEFS[n%WEEKLY_CHALLENGE_DEFS.length];
    S.weeklyMission={weekKey:wk, defId:def.id, startValue:weeklyMetricValue(def.metric), claimed:false};
    save();
  }
}
function weeklyProgress(){
  if(!S.weeklyMission) return null;
  const def=WEEKLY_CHALLENGE_DEFS.find(d=>d.id===S.weeklyMission.defId);
  if(!def) return null;
  const current=Math.max(0, weeklyMetricValue(def.metric)-S.weeklyMission.startValue);
  return {def, current, done:current>=def.target};
}
function claimWeeklyReward(){
  const p=weeklyProgress();
  if(!p || !p.done || S.weeklyMission.claimed){ toast('まだ達成していないか、受け取り済みです','error'); return; }
  S.weeklyMission.claimed=true;
  S.user.apPoints+=p.def.reward;
  save();
  toast('🎉 週間チャレンジ達成！解析ポイント+'+p.def.reward,'success');
  renderHQ();
}

  const today=gameDateKey();

  if(didRollover){
    collectingSummary=[];
    const prev=S.dailyMission;
    const allDone = prev.loginDone && prev.checkinDone && prev.taskDone;
    finalizeStreak(allDone, prev.gameDate);
    S.dailyMission={gameDate:today, loginDone:true, checkinDone:false, taskDone:false};

/* ══════════ 検査官イベント(簡易・pg_cron相当) ══════════ */
function inspectorTick(){
  if(!S) return;
  if(pendingEventTerritory) return; // 既にイベントカード対応中
  const now=Date.now();
  const elapsedHours=Math.floor((now-S.lastInspectorTick)/SIM_HOUR_MS);
  if(elapsedHours<1) return;
  S.lastInspectorTick += elapsedHours*SIM_HOUR_MS;
  const tm=timeMultiplier();
  let hitHash=null;
  Object.values(S.territories).forEach(t=>{
    if(hitHash) return;
    const immune=t.inspectorImmuneUntil && now<t.inspectorImmuneUntil;
    if(!immune && t.penetration>=INSPECTOR_MIN && t.penetration<=INSPECTOR_MAX){
      const typeInfo=territoryTypeInfo(t);
      const effectiveChance=Math.max(0, INSPECTOR_CHANCE_PER_HOUR*typeInfo.inspectorMult*tm.inspector - (t.defenseLevel||0)*0.01);
      for(let i=0;i<elapsedHours;i++){
        if(Math.random()<effectiveChance){
          hitHash=t.geohash;
          break;
        }
      }
    }
  });
  save();
  if(hitHash) triggerEventCard(hitHash);
}

function resolveEventCard(choice){
  const hash=pendingEventTerritory;
  pendingEventTerritory=null;
  document.getElementById('event-card-modal').classList.remove('active');
  const t=S.territories[hash];
  if(!t) return;
  const now=Date.now();

let MAP=null, _mapReady=false, playerMarker=null, hqMarker=null, _gridTimer=null;

function initMap(){

    container:'map',

    center:DEFAULT_CENTER, zoom:15.5, pitch:45, bearing:-8, antialias:true,
  });

  MAP.on('load', ()=>{
    _mapReady=true;
    _initCellLayers();
    redrawGrid();
    MAP.on('moveend', ()=>{ clearTimeout(_gridTimer); _gridTimer=setTimeout(redrawGrid,250); });
    MAP.on('zoomend', ()=>{ clearTimeout(_gridTimer); _gridTimer=setTimeout(redrawGrid,250); });
  });
}
function _initCellLayers(){
  MAP.addSource('cells',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  MAP.addLayer({id:'cells-fill',type:'fill',source:'cells',
    paint:{'fill-color':['get','color'],'fill-opacity':['get','fillOpacity']}});
  MAP.addLayer({id:'cells-border',type:'line',source:'cells',
    paint:{'line-color':['get','borderColor'],'line-width':1.4,'line-opacity':['get','borderOpacity']}});
  MAP.addLayer({id:'cells-extrusion',type:'fill-extrusion',source:'cells',
    filter:['>',['get','height'],1],
    paint:{'fill-extrusion-color':['get','color'],'fill-extrusion-height':['get','height'],
      'fill-extrusion-base':0,'fill-extrusion-opacity':['get','opacity']}});
  MAP.on('click', e=>{
    const feats=MAP.queryRenderedFeatures(e.point,{layers:['cells-extrusion','cells-fill']});
    if(feats.length>0){ const h=feats[0].properties.hash; if(h) openDetail(h); }
  });
  ['cells-extrusion','cells-fill'].forEach(id=>{
    MAP.on('mouseenter', id, ()=>{ MAP.getCanvas().style.cursor='pointer'; });
    MAP.on('mouseleave', id, ()=>{ MAP.getCanvas().style.cursor=''; });
  });
}
function cellFeature(hash, t){
  const bnd=Geohash.bounds(hash);
  const ring=[[bnd.sw.lon,bnd.sw.lat],[bnd.ne.lon,bnd.sw.lat],[bnd.ne.lon,bnd.ne.lat],[bnd.sw.lon,bnd.ne.lat],[bnd.sw.lon,bnd.sw.lat]];
  let color,height,opacity,borderColor,borderOpacity,fillOpacity;
  if(!t){
    color='#3a3024'; height=0; opacity=0; borderColor='#2e2418'; borderOpacity=0.35; fillOpacity=0.04;
  } else {
    const p=t.penetration;
    color=stateColor(p);
    height=4+(p/100)*36;
    opacity=0.85;
    const risky=p>=INSPECTOR_MIN&&p<=INSPECTOR_MAX;
    borderColor= risky?'#b33a2e':'#ffe9b3';
    borderOpacity= risky?0.9:0.55;
    fillOpacity=0.18;
  }
  return {type:'Feature',geometry:{type:'Polygon',coordinates:[ring]},
    properties:{hash,color,height,opacity,borderColor,borderOpacity,fillOpacity}};
}
function redrawGrid(){
  if(!MAP||!_mapReady||!S) return;
  const src=MAP.getSource('cells'); if(!src) return;
  const features=[];
  Object.values(S.territories).forEach(t=>features.push(cellFeature(t.geohash,t)));
  if(MAP.getZoom()>=14){
    const b=MAP.getBounds();
    Geohash.inBounds(b.getSouthWest().lat,b.getSouthWest().lng,b.getNorthEast().lat,b.getNorthEast().lng,PREC)
      .forEach(h=>{ if(!S.territories[h]) features.push(cellFeature(h,null)); });
  }
  src.setData({type:'FeatureCollection',features});
  updateHQMarker();
}
function redrawGridSafe(){ try{ redrawGrid(); }catch(e){ console.warn(e); } }

function doCheckin(e){
  if(!navigator.geolocation){ toast('この端末では位置情報が利用できません','error'); return; }
  spawnBtnRipple(e);
  const btn=document.getElementById('checkin-btn');
  btn.disabled=true; btn.textContent='📡 ...';
  navigator.geolocation.getCurrentPosition(
    pos=>processCheckin(pos.coords.latitude,pos.coords.longitude),
    err=>{
      if(err.code===1){
        toast('位置情報が未許可のため地図中心を使用(テスト用)','info');
        const c=MAP.getCenter(); processCheckin(c.lat,c.lng);
      } else { resetCheckinBtn(); toast('位置情報の取得に失敗しました','error'); }
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:15000}
  );
}
function resetCheckinBtn(){ const b=document.getElementById('checkin-btn'); b.disabled=false; b.textContent='🍬 チェックイン(砂糖を仕込む)'; }
function spawnBtnRipple(e){
  const btn=document.getElementById('checkin-btn'); if(!btn) return;
  const r=document.createElement('span'); r.className='btn-ripple';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  const cx = (e&&e.clientX!==undefined) ? e.clientX-rect.left : rect.width/2;
  const cy = (e&&e.clientY!==undefined) ? e.clientY-rect.top : rect.height/2;
  r.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px';
  btn.appendChild(r); setTimeout(()=>r.remove(),600);
}
function floatGain(text){
  const el=document.createElement('div');
  el.className='float-gain'; el.textContent=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1150);
}
function isTestMode(){ return !!(S && S.user && S.user.testMode); }
function processCheckin(lat,lon){
  const hash=Geohash.encode(lat,lon,PREC);
  const c=Geohash.decode(hash);
  const dist=haversine(lat,lon,c.lat,c.lon);
  if(!isTestMode() && dist>CHECKIN_TOLERANCE_M){
    resetCheckinBtn();
    toast('もう少し陣地の中心に近づいてみよう(誤差約'+Math.round(dist)+'m)','info');
    return;
  }
  checkDailyRollover();
  const t=getOrCreateTerritory(hash);
  const now=Date.now();
  const sinceLast=now-(t.lastCheckinAt||0);
  if(!isTestMode() && t.lastCheckinAt && sinceLast<HYSTERESIS_MS){
    resetCheckinBtn();
    toast('この陣地は処理済み。'+Math.ceil((HYSTERESIS_MS-sinceLast)/60000)+'分後に再度仕込もう','info');
    save();
    return;
  }
  const beforeLabel=stateLabel(t.penetration);
  const mult=adjacencyMultiplier(hash);
  const typeInfo=territoryTypeInfo(t);
  const tm=timeMultiplier();
  const gain=Math.round(PEN_PER_CHECKIN*mult*typeInfo.penMult*tm.pen);
  t.penetration=clamp(t.penetration+gain,0,100);
  t.lastCheckinAt=now; t.checkinCount=(t.checkinCount||0)+1;
  const afterLabel=stateLabel(t.penetration);

  const amount=Math.max(1, Math.round((TASK_MIN_AMOUNT+Math.floor(Math.random()*(TASK_MAX_AMOUNT-TASK_MIN_AMOUNT+1)))*typeInfo.taskMult) + (t.productionLevel||0));
  S.tasks.push({id:uid(), sourceGeohash:hash, amount, status:'pending', createdAt:now, expiresAt:nextResetTimestamp(now)});

  S.checkinLogs.unshift({geohash:hash, ts:now, lat, lon, gain, label:afterLabel});
  if(S.checkinLogs.length>300) S.checkinLogs.length=300;

  S.dailyMission.checkinDone=true;
  S.exposure=clamp(S.exposure+15,0,100);
  S.user.totalCheckins=(S.user.totalCheckins||0)+1;

  const firstInspectorTip = afterLabel==='発症' && !S.user.inspectorTipShown;
  if(firstInspectorTip) S.user.inspectorTipShown=true;

  save();
  setPlayerMarker(lat,lon);
  if(MAP) MAP.panTo([lon,lat]);
  redrawGridSafe();
  resetCheckinBtn();
  updateMapFooter();
  updateExposureUI();
  updateGuide();
  vibrate([30,20,30]);

  floatGain('+'+gain+'%');
  toast(beforeLabel!==afterLabel ? '🍬 +'+gain+'% → '+afterLabel+'！' : '🍬 +'+gain+'% 浸透成功','success');
  if(firstInspectorTip) setTimeout(()=>toast('⚠️ 発症段階(40-79%)は検査官に見つかるリスクあり','info'),1100);
  setTimeout(checkProgress, firstInspectorTip ? 1700 : 900);
}

function estimateTaskReward(){
  const pend=S.tasks.filter(t=>t.status==='pending');
  const amount=pend.reduce((s,t)=>s+t.amount,0);
  const connectedBonus=Object.keys(S.territories).filter(h=>isConnectedToHQ(h)).length;
  const hubBonus=Object.keys(S.territories).filter(h=>isHubTerritory(h)&&isConnectedToHQ(h)).length*2;
  const parkBonus=pend.reduce((s,t)=>{
    const terr=S.territories[t.sourceGeohash]; const info=terr&&territoryTypeInfo(terr);
    return s+((info&&info.apBonus)?info.apBonus:0);
  },0);
  const raw=amount*2+connectedBonus+hubBonus+parkBonus;
  return {total:Math.round(raw*ascensionMultiplier()), connectedBonus, hubBonus, parkBonus, base:amount*2};
}

function visitedTerritoryHashes(){
  return Object.keys(S.territories).filter(h=>S.territories[h].checkinCount>0);
}
function projectNodes(hashes,w,h,pad){
  const pts=hashes.map(hh=>{ const c=Geohash.decode(hh); return {hash:hh, lat:c.lat, lon:c.lon}; });
  if(pts.length===0) return {};
  let minLat=Math.min(...pts.map(p=>p.lat)), maxLat=Math.max(...pts.map(p=>p.lat));
  let minLon=Math.min(...pts.map(p=>p.lon)), maxLon=Math.max(...pts.map(p=>p.lon));
  if(maxLat-minLat<1e-6){minLat-=0.0005;maxLat+=0.0005;}
  if(maxLon-minLon<1e-6){minLon-=0.0005;maxLon+=0.0005;}
  const out={};
  pts.forEach(p=>{
    const nx=(p.lon-minLon)/(maxLon-minLon), ny=(p.lat-minLat)/(maxLat-minLat);
    out[p.hash]={x:pad+nx*(w-pad*2), y:(h-pad)-ny*(h-pad*2)};
  });
  resolveNodeOverlap(out, w, h, pad);
  return out;
}
function resolveNodeOverlap(pos, w, h, pad){
  const keys=Object.keys(pos);
  const minDist=24;
  for(let pass=0; pass<6; pass++){
    let moved=false;
    for(let i=0;i<keys.length;i++){
      for(let j=i+1;j<keys.length;j++){
        const a=pos[keys[i]], b=pos[keys[j]];
        let dx=b.x-a.x, dy=b.y-a.y;
        let dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<1){ dx=(Math.random()-0.5); dy=(Math.random()-0.5); dist=0.01; }
        if(dist<minDist){
          const push=(minDist-dist)/2;
          const ux=dx/dist, uy=dy/dist;
          a.x=clamp(a.x-ux*push, pad, w-pad);
          a.y=clamp(a.y-uy*push, pad, h-pad);
          b.x=clamp(b.x+ux*push, pad, w-pad);
          b.y=clamp(b.y+uy*push, pad, h-pad);
          moved=true;
        }
      }
    }
    if(!moved) break;
  }
}

function computeGuideText(){
  if(!S) return '…';
  if(Object.keys(S.territories).length===0) return '足元のコーヒーポットを探して、まず「チェックイン」で最初の一さじを仕込もう！';
  const pend=pendingTasksSummary();
  if(!S.user.hqGeohash) return 'チェックインした陣地を選んで「ここを本拠地にする」を押そう。指令を出す拠点が必要だ！';
  if(pend.count>0) return 'HQに'+pend.count+'件のシュガー粒が眠ってる。HQで解析して報酬を受け取ろう！';
  if(hasRecentSeverance()) return '⚠️ 通信経路が遮断された。通信網を開いて経路を再接続しよう';
  const decayingCount=countDecayingTerritories();
  if(decayingCount>0) return '📦 '+decayingCount+'箇所が本拠地と繋がっておらず、浸透度が静かに減衰している。通信網を繋いで補給しよう';
  const riskyCount=Object.values(S.territories).filter(t=>{
    const immune=t.inspectorImmuneUntil && Date.now()<t.inspectorImmuneUntil;
    return !immune && t.penetration>=INSPECTOR_MIN && t.penetration<=INSPECTOR_MAX;
  }).length;
  if(riskyCount>0) return riskyCount+'箇所が検査官に見つかりやすい状態だ。早めに浸透を進めるか、AP対策を検討しよう';
  if(!S.dailyMission.checkinDone) return '今日はまだチェックインしてないな。陣地を見て回ろう！';
  if(!S.dailyMission.taskDone) return 'タスク処理がまだ残ってる。HQをチェックしよう';
  return '今日のミッションは完了！新しい陣地を探しに行こう。ストリークが伸びてるぞ';
}

/* ══════════ TOAST(キュー方式: 連続発生時に消えるのが早すぎる問題を解消) ══════════ */
let toastQueue=[], toastBusy=false;
function toast(msg,type){
  toastQueue.push({msg,type});
  if(toastQueue.length>5) toastQueue.splice(0,toastQueue.length-5);
  if(!toastBusy) processToastQueue();
}
function processToastQueue(){
  if(toastQueue.length===0){ toastBusy=false; return; }
  toastBusy=true;
  const {msg,type}=toastQueue.shift();
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'');
  setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(processToastQueue,220);
  },1900);
}

    if(e.target.closest('#open-test-tab-btn')){ currentHQTab=3; renderHQ(); }
  });
  document.getElementById('net-graph-wrap').addEventListener('click', e=>{
    const g=e.target.closest('[data-hash]');
    if(g){ netSelected=g.dataset.hash; renderNetwork(); }
  });
  document.getElementById('net-panel').addEventListener('click', e=>{
    if(e.target.closest('#net-start-btn')){
      const h=netSelected, t=S.territories[h];
      const maxOut=outDegreeMax(h);
      const eligible=t&&outDegree(h)<maxOut&&t.checkinCount>0;
      if(!eligible){ toast('送信元として'+maxOut+'本接続済みです(最大'+maxOut+'本)','error'); }
      else { netPendingFrom=h; renderNetwork(); }
    }
    if(e.target.closest('#net-cancel-btn')){ netPendingFrom=null; renderNetwork(); }
    if(e.target.closest('#net-confirm-btn')){
      const from=netPendingFrom, to=netSelected;
      if(connectTerritories(from,to)){ netPendingFrom=null; }
      renderNetwork();
    }
  });
});
</script>
</body>
</html>
